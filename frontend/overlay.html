<!DOCTYPE html>
<html lang="zh">
<head>
  <script>
    (function () {
      try {
        var k = "altgo-theme-pref";
        var p = localStorage.getItem(k) || "system";
        var dark =
          p === "dark" ? true : p === "light" ? false : window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = dark ? "dark" : "light";
      } catch (e) {}
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>overlay</title>
  <link rel="icon" href="/altgo-logo.svg" type="image/svg+xml" />
  <style>
    html, body { background: transparent; margin: 0; padding: 0; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/overlay.tsx"></script>
</body>
</html>
