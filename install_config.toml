# altgo configuration - generated by install.ps1
# Edit as needed. See configs/altgo.toml for all available options.

[transcriber]
engine = "local"
model = "{MODEL_PATH}"
whisper_path = "{WHISPER_PATH}"
language = "zh"
timeout_seconds = 30

[polisher]
protocol = "openai"                 # "openai" 或 "anthropic"
api_key = ""                        # 润色 API Key，环境变量 ALTGO_POLISHER_API_KEY 也可
api_base_url = ""                   # API Base URL，level 不为 "none" 时必须设置
model = ""                          # 模型名，level 不为 "none" 时必须设置
level = "none"                      # 润色级别："none"、"light"、"medium"、"heavy"
max_tokens = 1024
timeout_seconds = 60

[output]
enable_notify = true
notify_timeout_ms = 5000
inject_at_cursor = true             # Attempt to inject text at cursor position (Windows only)
prefer_polished = true             # Prefer polished text for injection/copy
