name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc

      - name: Install WiX
        run: dotnet tool install --global wix --version 5.0.0 || echo "WiX already installed"

      - name: Build
        run: cargo build --target x86_64-pc-windows-msvc --release

      - name: Download dependencies
        shell: pwsh
        run: pwsh scripts/download-deps.ps1

      - name: Package zip
        shell: pwsh
        run: |
          $ReleaseDir = "target/x86_64-pc-windows-msvc/release"
          $Items = @("$ReleaseDir/altgo.exe")
          if (Test-Path "$ReleaseDir/bin") {
            $Items += "$ReleaseDir/bin"
          }
          Compress-Archive -Path $Items -DestinationPath altgo-x86_64-windows.zip

      - name: Build MSI
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $env:Path = "$env:USERPROFILE\.dotnet\tools;$env:Path"
          $ReleaseDir = "target/x86_64-pc-windows-msvc/release"
          if (Test-Path "target/deps/bin") {
            Copy-Item -Path "target/deps/bin" -Destination "$ReleaseDir/bin" -Recurse -Force
          }
          wix build msi/Product.wxs -d Version=$($env:VERSION -replace 'v','') -d SourceDir=$ReleaseDir -o target/altgo-x86_64-windows.msi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: altgo-x86_64-windows
          path: |
            altgo-x86_64-windows.zip
            target/altgo-x86_64-windows.msi
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} \; > ../checksums.txt
          cd ..
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
            checksums.txt

