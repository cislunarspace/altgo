name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: altgo-x86_64-linux
            ext: .tar.gz
            deb: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: altgo-aarch64-linux
            ext: .tar.gz
            deb: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: altgo-aarch64-macos
            ext: .tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: altgo-x86_64-windows
            ext: .zip
            msi_ext: .msi

    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libspeechd-dev libasound2-dev

      # Windows WiX toolchain
      - name: Install WiX (Windows MSI)
        if: runner.os == 'Windows'
        run: dotnet tool install --global wix --version 5.0.0 || echo "WiX already installed"

      # Install cargo-deb for Linux targets
      - name: Install cargo-deb (Linux)
        if: matrix.deb == true
        run: cargo install cargo-deb --locked

      - name: Build
        run: cargo build --target ${{ matrix.target }} --release

      # Build DEB packages
      - name: Build DEB (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo deb --no-build --target x86_64-unknown-linux-gnu --manifest-path Cargo.toml

      - name: Build DEB (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo deb --no-build --target aarch64-unknown-linux-gnu --manifest-path Cargo.toml

      # Package tar.gz (Linux/macOS)
      - name: Package (Linux/macOS tar.gz)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz altgo
          cd ../../..

      # Package zip (Windows)
      - name: Package (Windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/altgo.exe -DestinationPath ${{ matrix.artifact }}.zip

      # Build MSI (Windows)
      - name: Build MSI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $env:Path = "$env:USERPROFILE\.dotnet\tools;$env:Path"
          wix build msi/Product.wxs -d Version=$($env:VERSION -replace 'v','') -d SourceDir=target/${{ matrix.target }}/release -o target/${{ matrix.artifact }}.msi

      # Upload DEB artifacts
      - name: Upload DEB artifacts
        if: matrix.deb == true
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}-deb
          path: target/${{ matrix.target }}/release/debian/*.deb
          if-no-files-found: warn

      # Upload main artifact (tar.gz/zip + MSI)
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}${{ matrix.ext }}
            ${{ matrix.msi_ext && format('target/{0}{1}', matrix.artifact, matrix.msi_ext) }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} \; > ../checksums.txt
          cd ..
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
            checksums.txt