name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    # 与 release Linux 构建一致，避免仅在较新 runner 上能通过、deb 在 22.04 上 GLIBC 不兼容
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu

      # 系统依赖、打包用二进制、Tauri CLI 统一在 composite action 里装
      - uses: ./.github/actions/setup-linux-build

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend

      - name: Check formatting
        run: cargo fmt --manifest-path=src-tauri/Cargo.toml --all -- --check

      - name: Clippy
        run: cargo clippy --manifest-path=src-tauri/Cargo.toml -- -D warnings

      - name: Build
        run: cargo build --release --manifest-path=src-tauri/Cargo.toml

      - name: Run tests
        run: cargo test --manifest-path=src-tauri/Cargo.toml --lib

      - name: Build Tauri GUI
        run: cargo tauri build --bundles deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Windows 只验证不打包：fmt + clippy + test，拦住 cfg(windows) 代码的问题
  # （Linux job 编译不到那段）。tauri_sink 测试仅 Windows 编译（#100），
  # 其 CI 覆盖由本 job 承接。
  windows-check:
    name: Windows Check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc

      - name: Check formatting
        run: cargo fmt --manifest-path=src-tauri/Cargo.toml --all -- --check

      - name: Clippy
        run: cargo clippy --manifest-path=src-tauri/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path=src-tauri/Cargo.toml --lib
