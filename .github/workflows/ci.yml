name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    # 与 release Linux 构建一致，避免仅在较新 runner 上能通过、deb 在 22.04 上 GLIBC 不兼容
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libasound2-dev build-essential cmake

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Check formatting
        run: cargo fmt --manifest-path=src-tauri/Cargo.toml --all -- --check

      - name: Clippy
        run: cargo clippy --manifest-path=src-tauri/Cargo.toml -- -D warnings

      - name: Build
        run: cargo build --release --manifest-path=src-tauri/Cargo.toml

      - name: Run tests
        run: cargo test --manifest-path=src-tauri/Cargo.toml

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Download bundled binaries (ffmpeg, whisper-cli)
        run: bash packaging/scripts/download-deps.sh x86_64

      - name: Build Tauri GUI
        run: cargo tauri build --bundles deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
