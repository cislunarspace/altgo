# altgo 配置文件
# 复制到 ~/.config/altgo/altgo.toml 后修改

[key_listener]
# 触发键的 X11 keysym：默认 Alt_R = 右侧 Alt（与 xmodmap 中 keysym 名一致）
# 若要用左侧 Alt，改为：key_name = "Alt_L"
# 以下为可选，通常由设置页「按下以设置」自动写入：
# linux_evdev_code = 100   # Linux Wayland/evtest 使用的 evdev 键码（十进制）
# windows_vk = 165         # Windows 虚拟键码（十进制，如 165 = 0xA5 右 Alt）
key_name = "Alt_R"
long_press_threshold_ms = 200       # 长按/短按区分阈值（毫秒）
double_click_interval_ms = 300      # 双击判定间隔（毫秒）
min_press_duration_ms = 100         # 最短按下时长（毫秒），过滤 IME 抖动
poll_interval_ms = 30               # Windows 轮询间隔（毫秒），越小响应越快

[recorder]
sample_rate = 16000
channels = 1

[transcriber]
engine = "local"                     # "api"（OpenAI Whisper API）或 "local"（whisper.cpp）
api_key = ""                        # API 模式下的 API Key
api_base_url = ""                   # API 模式下的 base URL
model = ""                          # API 模式：模型名（如 "whisper-1"）；本地模式：GGML 模型文件路径
whisper_path = ""                   # whisper-cli 路径，留空则自动查找 PATH
language = "zh"                     # 语言提示，如 "zh"（中文）、"en"（英文）
timeout_seconds = 30
temperature = 0.0                   # Whisper API temperature（0.0-1.0），越低越确定性
prompt = ""                         # Whisper API 提示词，提供领域词汇以提升识别率

[polisher]
protocol = "openai"                 # "openai"（OpenAI 兼容 API）或 "anthropic"（Anthropic Messages API）
api_key = ""                        # API Key，也可通过 ALTGO_POLISHER_API_KEY 环境变量设置
api_base_url = ""                   # API Base URL，level 不为 "none" 时必须设置
model = ""                          # 模型名，level 不为 "none" 时必须设置
level = "none"                      # 润色级别："none"（禁用）、"light"、"medium"、"heavy"
max_tokens = 1024                   # LLM 响应的最大 token 数
timeout_seconds = 60
temperature = 0.3                   # LLM temperature（0.0-2.0）
system_prompt = ""                  # 自定义 system prompt，为空则使用内置多语言 prompt

[output]
enable_notify = true
notify_timeout_ms = 5000
inject_at_cursor = true             # 尝试将文本注入到当前光标位置（仅 Windows）
prefer_polished = true              # 注入/复制时优先使用润色后的文本

[logging]
level = "info"
