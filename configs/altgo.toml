# altgo configuration
# Copy to ~/.config/altgo/altgo.toml and edit as needed.

[key_listener]
# X11 keysym name for the trigger key. Default: ISO_Level3_Shift (right Alt).
key_name = "ISO_Level3_Shift"
# Duration in ms to distinguish long press from short click.
long_press_threshold_ms = 300
# Max interval in ms between two clicks to count as double click.
double_click_interval_ms = 300

[recorder]
sample_rate = 16000
channels = 1

[transcriber]
# Engine: "api" (OpenAI Whisper API) or "local" (whisper.cpp).
engine = "local"
# For "api" mode: API key and base URL.
api_key = ""
api_base_url = "https://api.openai.com"
# For "api" mode: model name (e.g. "whisper-1").
# For "local" mode: path to GGML model file (e.g. "~/models/ggml-base.bin").
model = ""
# Language hint: "zh" for Chinese, "en" for English, etc.
language = "zh"
timeout_seconds = 30

[polisher]
# Engine: "openai", "ollama", etc.
engine = "openai"
# API key. Can also be set via ALTGO_POLISHER_API_KEY env var.
api_key = ""
api_base_url = "https://api.deepseek.com"
model = "deepseek-chat"
# Polish level: "none", "light", "medium", "heavy".
level = "medium"
# Max tokens for LLM response. Increase for long transcriptions.
max_tokens = 1024
timeout_seconds = 60

[output]
enable_notify = true
notify_timeout_ms = 3000

[logging]
level = "info"
